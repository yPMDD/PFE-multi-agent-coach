version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pfe-postgres
    environment:
      POSTGRES_USER: pfe
      POSTGRES_PASSWORD: pfe_secret
      POSTGRES_DB: pfe_coach
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pfe -d pfe_coach"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pfe-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pfecoach.com
      PGADMIN_DEFAULT_PASSWORD: pfe_secret
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pfe-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - POSTGRES_USER=pfe
      - POSTGRES_PASSWORD=pfe_secret
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=pfe_coach
      - DATABASE_URL=postgresql://pfe:pfe_secret@postgres:5432/pfe_coach
      - CHROMA_PERSIST_PATH=/app/chroma_db
      - FASTAPI_PORT=8000
    volumes:
      - chroma_data:/app/chroma_db
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: pfe-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
      - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
      - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
      - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID}
      - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:
  pgadmin_data: